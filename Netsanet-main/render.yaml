services:
  - type: web_service
    name: netsanet-backend
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    workingDirectory: backend
    # Do NOT store secrets here. Set these in the Render dashboard or via the CLI.
    envVars:
      - key: SUPABASE_URL
        value: ""
      - key: SUPABASE_KEY
        value: ""
      - key: GEMINI_API_KEY
        value: ""
      - key: SECRET_KEY
        value: ""
      - key: ALLOWED_ORIGINS
        value: ""

  - type: static_site
    name: netsanet-frontend
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    publishPath: dist
    rootDir: frontend
    # Optional: set an env var with the backend URL, e.g. https://netsanet-backend.onrender.com
    envVars:
      - key: VITE_API_BASE_URL
        value: ""
